name: Release A Security

on:
  pull_request:
  push:
    branches: [main, master, enterprise-hardening-backlog]

jobs:
  release-a-security:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip fastapi uvicorn pytest

      - name: Renderer + config verification
        run: |
          python scripts/render-openclaw-config.py --self-test
          python scripts/render-openclaw-config.py --verify-file .openclaw/openclaw.json
          if [[ -f .data/openclaw-config/openclaw.json ]]; then
            python scripts/render-openclaw-config.py --verify-file .data/openclaw-config/openclaw.json
          fi

      - name: Compile Python
        run: |
          python -m compileall -q scripts services/archon-control-plane services/archon-mcp services/openclaw-runtime tests

      - name: Shell scripts
        run: |
          for f in scripts/*.sh; do
            bash -n "$f"
          done

      - name: Secret pattern guardrail
        run: bash scripts/check-repo-secrets.sh

      - name: Release A security tests
        run: pytest -q tests/test_release_a_security.py
